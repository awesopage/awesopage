tasks:
  - init: nvm install 18 && pnpm boot && node scripts/local-services start && node scripts/workspace.js set-gitpod-env
    command: node scripts/local-services start && pnpm lint && pnpm dev
  - init: npx --yes playwright install-deps
    command: echo 'Playwright is ready'

ports:
  - name: dev application
    port: 4000
    onOpen: notify
    visibility: public
  - name: dev ports
    port: 4900-4999
    onOpen: ignore
  - name: test ports
    port: 4800-4899
    onOpen: ignore
