tasks:
  - name: Playwright
    init: >
      gp sync-await boot &&
      npx --yes playwright install-deps
    command: echo 'Playwright is ready'
  - name: Development
    init: >
      nvm install 18 &&
      pnpm boot &&
      gp sync-done boot
      node scripts/local-services start &&
      node scripts/workspace.js set-gitpod-env
    command: >
      node scripts/local-services start &&
      pnpm lint &&
      pnpm dev

ports:
  - name: dev application
    port: 4000
    onOpen: notify
    visibility: public
  - name: dev ports
    port: 4900-4999
    onOpen: ignore
  - name: test ports
    port: 4800-4899
    onOpen: ignore
